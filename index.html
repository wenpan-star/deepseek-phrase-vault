<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek 语句工坊 | 搜索 · 持久标签</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E📦%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e6edf2 100%);
            height: 100vh;
            overflow: hidden;
            color: #1a2c3e;
        }
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.4);
        }
        .sidebar {
            width: 68px;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0,0,0,0.06);
            transition: width 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
            flex-shrink: 0;
        }
        .sidebar.expanded {
            width: 260px;
        }
        @media (hover: hover) and (pointer: fine) {
            .sidebar:not(.touch-mode):hover {
                width: 260px;
            }
        }
        .sidebar-header {
            padding: 20px 16px 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            margin-bottom: 8px;
        }
        .sidebar-logo {
            background: linear-gradient(135deg, #0a5b8c, #1e88e5);
            width: 38px;
            height: 38px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sidebar-logo i { font-size: 22px; color: white; }
        .sidebar-title {
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(135deg, #1a5d7d, #0e3a50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sidebar.expanded .sidebar-title, .sidebar:hover .sidebar-title { opacity: 1; }
        .tags-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 16px 10px;
        }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .tag-item i { width: 24px; font-size: 1rem; color: #5b7e9e; flex-shrink: 0; }
        .tag-name {
            flex: 1;
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c4c6c;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .sidebar.expanded .tag-name, .sidebar:hover .tag-name { opacity: 1; }
        .tag-badge {
            background: #e2ebf3;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c6b9a;
            opacity: 0;
        }
        .sidebar.expanded .tag-badge, .sidebar:hover .tag-badge { opacity: 1; }
        .tag-item.active { background: #e3f2fd; }
        .tag-item.active i, .tag-item.active .tag-name { color: #1976d2; font-weight: 600; }
        .delete-tag-icon {
            opacity: 0;
            background: rgba(0,0,0,0.06);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            color: #8facc0;
        }
        .tag-item:hover .delete-tag-icon { opacity: 1; }
        .delete-tag-icon:hover { background: #ffcdd2; color: #d32f2f; }
        .add-tag-btn {
            margin: 12px 10px;
            background: #eef2fa;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1976d2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-tag-btn span { display: none; }
        .sidebar.expanded .add-tag-btn span, .sidebar:hover .add-tag-btn span { display: inline; }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(250,252,254,0.4);
        }
        .app-header {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            padding: 0.7rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            gap: 12px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            background: linear-gradient(135deg, #0a5b8c, #1e88e5);
            width: 44px; height: 44px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .title h1 {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, #1a5d7d, #0e3a50);
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .stat-badge {
            background: #eef2fa; border-radius: 100px; padding: 6px 14px;
            font-size: 0.8rem; font-weight: 500;
        }
        .btn {
            border: none; background: white; padding: 6px 16px; border-radius: 40px;
            font-weight: 500; font-size: 0.8rem; display: inline-flex; align-items: center;
            gap: 8px; cursor: pointer; border: 1px solid rgba(0,0,0,0.06);
            background: #ffffffcc; backdrop-filter: blur(2px);
        }
        .btn-primary { background: #1976d2; color: white; border: none; }
        /* 搜索框样式 */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 40px;
            padding: 0.1rem 0.8rem;
            border: 1px solid rgba(0,0,0,0.08);
            gap: 8px;
            flex: 1;
            min-width: 180px;
            max-width: 280px;
        }
        .search-wrapper i {
            color: #8ba0ae;
            font-size: 0.9rem;
        }
        .search-wrapper input {
            border: none;
            padding: 8px 0;
            font-size: 0.85rem;
            background: transparent;
            outline: none;
            width: 100%;
        }
        .search-wrapper input::placeholder {
            color: #b8c7d4;
        }
        .clear-search {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #8ba0ae;
            padding: 4px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .clear-search:hover {
            background: #edf4fa;
            color: #1976d2;
        }
        @media (max-width: 700px) {
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper {
                max-width: none;
                width: 100%;
            }
            .header-actions {
                justify-content: flex-start;
            }
        }
        .main-list { flex: 1; overflow-y: auto; padding: 1.2rem 1.8rem; }
        .statements-grid { display: flex; flex-direction: column; gap: 12px; }
        .statement-card {
            background: white; border-radius: 24px; padding: 0.9rem 1.2rem;
            display: flex; align-items: center; gap: 1rem;
            border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            cursor: grab;
        }
        .statement-card:active { cursor: grabbing; }
        .card-index {
            font-weight: 600; min-width: 40px; text-align: center;
            background: #f0f4f9; padding: 4px 0; border-radius: 40px; font-size: 0.85rem;
        }
        .card-content { flex: 1; font-size: 0.95rem; line-height: 1.45; font-weight: 500; word-break: break-word; }
        .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .icon-btn {
            background: transparent; border: none; font-size: 1rem; width: 36px; height: 36px;
            border-radius: 40px; display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; color: #56748c; transition: 0.15s;
        }
        .icon-btn:hover { background: #edf4fa; color: #1976d2; }
        .delete-btn:hover { background: #fee8e8; color: #d32f2f; }
        .add-section {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05); padding: 0.8rem 1.8rem 1.2rem;
        }
        .add-wrapper {
            display: flex; gap: 12px; background: white; border-radius: 60px;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem; border: 1px solid #e2edf3;
        }
        .add-wrapper input { flex: 1; border: none; padding: 12px 0; font-size: 0.9rem; background: transparent; outline: none; }
        .add-wrapper button { background: #1976d2; border-radius: 50px; padding: 8px 26px; border: none; color: white; font-weight: 600; cursor: pointer; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card { background: white; width: 90%; max-width: 640px; border-radius: 36px; padding: 1.8rem; }
        .tag-select-list { max-height: 300px; overflow-y: auto; margin: 1rem 0; }
        .tag-option {
            padding: 12px 16px; background: #f8fafc; border-radius: 60px; margin: 8px 0;
            cursor: pointer; transition: all 0.1s; font-weight: 500; display: flex; align-items: center; gap: 10px;
        }
        .tag-option:hover { background: #e3f2fd; }
        .toast-msg {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: #1f2f3ad9; backdrop-filter: blur(12px); color: white;
            padding: 10px 24px; border-radius: 80px; font-size: 0.85rem; z-index: 1100;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .empty-state { text-align: center; padding: 3rem; background: #ffffffaa; border-radius: 48px; color: #8ba0ae; }
        .version-footer { text-align: center; font-size: 0.7rem; color: #8ba0ae; padding: 6px 0 10px; background: rgba(255,255,255,0.5); }
        .sortable-drag { opacity: 0.3; background: #e3f2fd; }
        .search-highlight {
            background-color: #fff3c9;
            border-radius: 6px;
            padding: 0 2px;
        }
        @media (max-width: 700px) {
            .sidebar { width: 56px; }
            .sidebar.expanded { width: 220px; }
            .main-list { padding: 1rem; }
            .card-actions .icon-btn { width: 40px; height: 40px; }
            .modal-card { max-width: 92%; padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-layout" id="appLayout">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><i class="fas fa-tags"></i></div>
            <div class="sidebar-title">语料标签</div>
        </div>
        <div class="tags-scroll" id="sidebarTagsList"></div>
        <div class="add-tag-btn" id="sidebarAddTagBtn"><i class="fas fa-plus-circle"></i><span>新建标签</span></div>
    </div>
    <div class="main-content">
        <div class="app-header">
            <div class="logo-area"><div class="logo-icon"><i class="fas fa-shield-alt"></i></div><div class="title"><h1>DeepSeek 语句工坊</h1></div></div>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索语句..." autocomplete="off">
                <button class="clear-search" id="clearSearchBtn" style="display: none;"><i class="fas fa-times-circle"></i></button>
            </div>
            <div class="header-actions">
                <div class="stat-badge" id="statCounter"><i class="fas fa-layer-group"></i> <span>0</span> 条</div>
                <button class="btn btn-outline" id="exportBtn"><i class="fas fa-download"></i> 导出全局</button>
                <label class="btn btn-outline" for="importFileInput"><i class="fas fa-upload"></i> 导入全局/旧档</label>
                <input type="file" id="importFileInput" accept=".json" style="display: none;">
                <button class="btn btn-outline" id="resetDefaultBtn"><i class="fas fa-lightbulb"></i> 重置全局</button>
            </div>
        </div>
        <div class="main-list" id="mainListContainer"><div id="statementsList" class="statements-grid"></div></div>
        <div class="add-section">
            <div class="add-wrapper">
                <input type="text" id="newStatementInput" placeholder="✍️ 写下新的语句或提示词..." autocomplete="off">
                <button id="addStatementBtn"><i class="fas fa-plus-circle"></i> 添加</button>
            </div>
        </div>
        <div class="version-footer">版本 v4.3.0  |  AES-256-GCM 加密  |  实时搜索  |  标签持久保存</div>
    </div>
</div>

<!-- 编辑模态框 -->
<div id="editModal" class="modal"><div class="modal-card"><h3><i class="fas fa-pen-fancy"></i> 编辑语句</h3><textarea id="editTextarea" rows="3" style="width:100%; margin: 12px 0; border-radius: 20px; padding: 12px; border:1px solid #ddd;"></textarea><div class="modal-actions" style="display:flex; gap:12px; justify-content:flex-end;"><button class="btn btn-outline" id="cancelEditBtn">取消</button><button class="btn btn-primary" id="saveEditBtn">保存</button></div></div></div>
<!-- 新建/重命名标签模态框 -->
<div id="tagModal" class="modal"><div class="modal-card"><h3 id="tagModalTitle"><i class="fas fa-tag"></i> 标签</h3><input type="text" id="tagNameInput" placeholder="标签名称" maxlength="20" style="width:100%; margin: 12px 0; padding: 10px; border-radius: 40px; border:1px solid #ccc;"><div class="modal-actions" style="display:flex; gap:12px; justify-content:flex-end;"><button class="btn btn-outline" id="cancelTagBtn">取消</button><button class="btn btn-primary" id="confirmTagBtn">确定</button></div></div></div>
<!-- 选择目标标签模态框 -->
<div id="selectTagModal" class="modal"><div class="modal-card"><h3><i class="fas fa-share-alt"></i> 复制语句到标签</h3><div id="tagSelectList" class="tag-select-list"></div><div class="modal-actions" style="display:flex; gap:12px; justify-content:flex-end;"><button class="btn btn-outline" id="cancelSelectTagBtn">取消</button></div></div></div>

<script>
    // ------------------- Web Crypto AES-256-GCM -------------------
    const PBKDF2_ITERATIONS = 100000;
    const SALT = new Uint8Array([0x3d,0x8e,0x2a,0x1f,0x6c,0xb4,0x5e,0x9a,0x7c,0x2d,0x4b,0x8a,0x1e,0x3c,0x6f,0x9d]);
    const ENCRYPT_KEY_STR = "deepseek-statement-vault-2025-v3";
    async function getEncryptionKey() {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(ENCRYPT_KEY_STR), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey({ name: "PBKDF2", salt: SALT, iterations: PBKDF2_ITERATIONS, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    }
    async function encryptState(dataObj) {
        const plaintext = JSON.stringify(dataObj);
        const data = new TextEncoder().encode(plaintext);
        const key = await getEncryptionKey();
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
        const combined = new Uint8Array(iv.length + encrypted.byteLength);
        combined.set(iv); combined.set(new Uint8Array(encrypted), iv.length);
        return btoa(String.fromCharCode(...combined));
    }
    async function decryptState(encryptedBase64) {
        try {
            const binary = atob(encryptedBase64);
            const combined = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) combined[i] = binary.charCodeAt(i);
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const key = await getEncryptionKey();
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
            return JSON.parse(new TextDecoder().decode(decrypted));
        } catch(e) { return null; }
    }

    const DEFAULT_TAG_ID = "default_main_tag_001";
    
    let appState = { tags: [], statementsMap: {}, uiState: { currentTagId: null, sidebarExpanded: false, mainListScrollTop: 0, sidebarScrollTop: 0, searchKeyword: "" } };
    let sortableInstance = null;
    let currentEditId = null;
    let isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    let pendingCopyStatementText = null;
    let scrollSaveTimer = null;

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 10); }

    function isDuplicateInTag(tagId, text, excludeStatementId = null) {
        const statements = appState.statementsMap[tagId] || [];
        const normalized = text.trim();
        return statements.some(stmt => stmt.text.trim() === normalized && (excludeStatementId === null || stmt.id !== excludeStatementId));
    }

    function ensureDefaultTagExists() {
        const hasDefault = appState.tags.some(t => t.id === DEFAULT_TAG_ID);
        if (!hasDefault) {
            appState.tags.unshift({ id: DEFAULT_TAG_ID, name: "默认语库" });
            if (!appState.statementsMap[DEFAULT_TAG_ID]) appState.statementsMap[DEFAULT_TAG_ID] = [];
        } else {
            const defaultTag = appState.tags.find(t => t.id === DEFAULT_TAG_ID);
            if (defaultTag && defaultTag.name !== "默认语库") defaultTag.name = "默认语库";
        }
        if (!appState.uiState.currentTagId || !appState.tags.some(t => t.id === appState.uiState.currentTagId)) {
            appState.uiState.currentTagId = DEFAULT_TAG_ID;
        }
    }

    function getPresetStatements() {
        return [
            { id: generateId(), text: "务必保证其他所有的功能 界面 设置都不变基础上(功能可以适当优化 但是不能降级或删除)  所有代码都不要简写 基于我所提供的代码" },
            { id: generateId(), text: "使用 Web Crypto API 实现 AES-256-GCM 加密" },
            { id: generateId(), text: "增强手机交互（兼容苹果、华为手机上的 Chrome和QQ浏览器）" },
            { id: generateId(), text: "美化界面 图标 使其更美观 人性化（不改变大小 样式）" },
            { id: generateId(), text: "深度思考该怎么解决，整合最佳实施方案" },
            { id: generateId(), text: "更新版本号" },
            { id: generateId(), text: "一次生成不完 可以分多次生成 到时候我自己复制到TXT 后改后缀" }
        ];
    }

    async function persistState() {
        const toStore = { tags: appState.tags, statementsMap: appState.statementsMap, uiState: appState.uiState };
        const encrypted = await encryptState(toStore);
        localStorage.setItem("ds_encrypted_vault_v3", encrypted);
    }

    function saveScrollPositions() {
        const mainList = document.getElementById('mainListContainer');
        const sidebarScroll = document.querySelector('.tags-scroll');
        if (mainList) appState.uiState.mainListScrollTop = mainList.scrollTop;
        if (sidebarScroll) appState.uiState.sidebarScrollTop = sidebarScroll.scrollTop;
        persistState();
    }

    function restoreScrollPositions() {
        const mainList = document.getElementById('mainListContainer');
        const sidebarScroll = document.querySelector('.tags-scroll');
        if (mainList && typeof appState.uiState.mainListScrollTop === 'number') {
            mainList.scrollTop = appState.uiState.mainListScrollTop;
        }
        if (sidebarScroll && typeof appState.uiState.sidebarScrollTop === 'number') {
            sidebarScroll.scrollTop = appState.uiState.sidebarScrollTop;
        }
    }

    function bindScrollMemory() {
        const mainList = document.getElementById('mainListContainer');
        const sidebarScroll = document.querySelector('.tags-scroll');
        const saveHandler = () => {
            if (scrollSaveTimer) clearTimeout(scrollSaveTimer);
            scrollSaveTimer = setTimeout(() => saveScrollPositions(), 150);
        };
        if (mainList) mainList.addEventListener('scroll', saveHandler);
        if (sidebarScroll) sidebarScroll.addEventListener('scroll', saveHandler);
    }

    async function loadInitialState() {
        const raw = localStorage.getItem("ds_encrypted_vault_v3");
        if (raw) {
            const decrypted = await decryptState(raw);
            if (decrypted && decrypted.tags && decrypted.statementsMap) {
                appState.tags = decrypted.tags;
                appState.statementsMap = decrypted.statementsMap;
                appState.uiState = decrypted.uiState || { currentTagId: null, sidebarExpanded: false, mainListScrollTop: 0, sidebarScrollTop: 0, searchKeyword: "" };
                if (typeof appState.uiState.mainListScrollTop !== 'number') appState.uiState.mainListScrollTop = 0;
                if (typeof appState.uiState.sidebarScrollTop !== 'number') appState.uiState.sidebarScrollTop = 0;
                if (typeof appState.uiState.searchKeyword !== 'string') appState.uiState.searchKeyword = "";
                for (let tid in appState.statementsMap) if (!Array.isArray(appState.statementsMap[tid])) appState.statementsMap[tid] = [];
                ensureDefaultTagExists();
                if (appState.statementsMap[DEFAULT_TAG_ID].length === 0) {
                    appState.statementsMap[DEFAULT_TAG_ID] = getPresetStatements();
                }
                await persistState();
                return;
            }
        }
        appState.tags = [{ id: DEFAULT_TAG_ID, name: "默认语库" }];
        appState.statementsMap = { [DEFAULT_TAG_ID]: getPresetStatements() };
        appState.uiState = { currentTagId: DEFAULT_TAG_ID, sidebarExpanded: false, mainListScrollTop: 0, sidebarScrollTop: 0, searchKeyword: "" };
        await persistState();
    }

    // 搜索相关
    let currentSearchKeyword = "";
    function updateSearchUI() {
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        if (searchInput) {
            searchInput.value = currentSearchKeyword;
            if (clearBtn) clearBtn.style.display = currentSearchKeyword ? "flex" : "none";
        }
        renderStatements();  // 重新渲染以应用高亮和过滤
    }
    function performSearch(keyword) {
        currentSearchKeyword = keyword.trim();
        appState.uiState.searchKeyword = currentSearchKeyword;
        persistState();
        updateSearchUI();
    }
    function clearSearch() {
        performSearch("");
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = "";
    }

    // 高亮文本
    function highlightText(text, keyword) {
        if (!keyword) return escapeHtml(text);
        const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedKeyword})`, 'gi');
        const parts = text.split(regex);
        return parts.map(part => {
            if (part.toLowerCase() === keyword.toLowerCase()) {
                return `<span class="search-highlight">${escapeHtml(part)}</span>`;
            }
            return escapeHtml(part);
        }).join('');
    }

    function currentStatements() {
        if (!appState.uiState.currentTagId || !appState.statementsMap[appState.uiState.currentTagId]) return [];
        return appState.statementsMap[appState.uiState.currentTagId];
    }

    function getFilteredStatements() {
        const all = currentStatements();
        if (!currentSearchKeyword) return all;
        const lowerKeyword = currentSearchKeyword.toLowerCase();
        return all.filter(stmt => stmt.text.toLowerCase().includes(lowerKeyword));
    }

    function setCurrentStatements(newList) {
        if (!appState.uiState.currentTagId) return;
        appState.statementsMap[appState.uiState.currentTagId] = newList;
        persistState().then(() => { 
            // 如果当前有搜索关键词，需要重新触发渲染以更新过滤后的列表
            renderStatements(); 
            updateStats(); 
            initDragAndDrop(); 
            renderSidebar(); 
            restoreScrollPositions();
        });
    }

    function renderSidebar() {
        const container = document.getElementById('sidebarTagsList');
        if (!container) return;
        let html = '';
        appState.tags.forEach(tag => {
            const count = (appState.statementsMap[tag.id] || []).length;
            const activeClass = (appState.uiState.currentTagId === tag.id) ? 'active' : '';
            const isDefault = (tag.id === DEFAULT_TAG_ID);
            html += `
                <div class="tag-item ${activeClass}" data-tag-id="${tag.id}">
                    <i class="fas ${isDefault ? 'fa-home' : 'fa-tag'}"></i>
                    <span class="tag-name">${escapeHtml(tag.name)}</span>
                    <span class="tag-badge">${count}</span>
                    ${!isDefault ? `<span class="delete-tag-icon" data-action="deleteTag" data-tag-id="${tag.id}"><i class="fas fa-times"></i></span>` : `<span style="width:26px;"></span>`}
                </div>
            `;
        });
        container.innerHTML = html;
        document.querySelectorAll('.tag-item').forEach(el => {
            const tid = el.getAttribute('data-tag-id');
            if (!tid) return;
            el.addEventListener('click', (e) => {
                if (e.target.closest('.delete-tag-icon')) return;
                switchToTag(tid);
            });
        });
        document.querySelectorAll('.delete-tag-icon').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const tid = btn.getAttribute('data-tag-id'); if(tid) deleteTagById(tid); });
        });
        const sidebarScroll = document.querySelector('.tags-scroll');
        if (sidebarScroll && typeof appState.uiState.sidebarScrollTop === 'number') {
            sidebarScroll.scrollTop = appState.uiState.sidebarScrollTop;
        }
    }

    function switchToTag(tagId) {
        if (!appState.tags.find(t => t.id === tagId)) return;
        appState.uiState.currentTagId = tagId;
        // 切换标签时清空搜索关键词，避免残留
        if (currentSearchKeyword) {
            currentSearchKeyword = "";
            appState.uiState.searchKeyword = "";
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = "";
            document.getElementById('clearSearchBtn').style.display = "none";
        }
        persistState();
        renderSidebar();
        renderStatements();
        updateStats();
        initDragAndDrop();
        restoreScrollPositions();
    }

    async function deleteTagById(tagId) {
        if (tagId === DEFAULT_TAG_ID) { showMessage("默认语库不可删除", true); return; }
        if (appState.tags.length === 1) { showMessage("至少保留一个标签", true); return; }
        if (confirm(`删除标签「${appState.tags.find(t=>t.id===tagId)?.name}」及其所有语句？`)) {
            appState.tags = appState.tags.filter(t => t.id !== tagId);
            delete appState.statementsMap[tagId];
            if (appState.uiState.currentTagId === tagId) appState.uiState.currentTagId = DEFAULT_TAG_ID;
            await persistState();
            renderSidebar();
            renderStatements();
            updateStats();
            initDragAndDrop();
            restoreScrollPositions();
            showMessage("标签已删除");
        }
    }

    function showCopyToTagModal(statementText) {
        const otherTags = appState.tags.filter(t => t.id !== appState.uiState.currentTagId);
        if (otherTags.length === 0) { showMessage("没有其他标签可复制", true); return; }
        pendingCopyStatementText = statementText;
        const listContainer = document.getElementById('tagSelectList');
        listContainer.innerHTML = '';
        otherTags.forEach(tag => {
            const div = document.createElement('div');
            div.className = 'tag-option';
            div.innerHTML = `<i class="fas fa-tag"></i> ${escapeHtml(tag.name)} (${(appState.statementsMap[tag.id] || []).length}条)`;
            div.addEventListener('click', () => {
                const targetId = tag.id;
                const trimmedText = pendingCopyStatementText.trim();
                if (isDuplicateInTag(targetId, trimmedText)) {
                    showMessage(`❌ 目标标签「${tag.name}」中已存在相同语句，无法复制`, true);
                    closeSelectTagModal();
                    return;
                }
                const newStmt = { id: generateId(), text: trimmedText };
                if (!appState.statementsMap[targetId]) appState.statementsMap[targetId] = [];
                appState.statementsMap[targetId].push(newStmt);
                persistState().then(() => {
                    renderSidebar();
                    if (appState.uiState.currentTagId === targetId) renderStatements();
                    showMessage(`✅ 已复制到「${tag.name}」`);
                });
                closeSelectTagModal();
            });
            listContainer.appendChild(div);
        });
        document.getElementById('selectTagModal').style.display = 'flex';
    }
    function closeSelectTagModal() { document.getElementById('selectTagModal').style.display = 'none'; pendingCopyStatementText = null; }
    
    async function copyToDefaultLibrary(statementText) {
        if (appState.uiState.currentTagId === DEFAULT_TAG_ID) { showMessage("当前已在默认语库", true); return; }
        const trimmed = statementText.trim();
        if (isDuplicateInTag(DEFAULT_TAG_ID, trimmed)) {
            showMessage(`❌ 默认语库中已存在相同语句，无法添加`, true);
            return;
        }
        const newStmt = { id: generateId(), text: trimmed };
        if (!appState.statementsMap[DEFAULT_TAG_ID]) appState.statementsMap[DEFAULT_TAG_ID] = [];
        appState.statementsMap[DEFAULT_TAG_ID].push(newStmt);
        await persistState();
        renderSidebar();
        if (appState.uiState.currentTagId === DEFAULT_TAG_ID) renderStatements();
        showMessage(`✨ 已添加至默认语库`);
    }

    function renderStatements() {
        const container = document.getElementById('statementsList');
        const allStmts = currentStatements();
        const filteredStmts = getFilteredStatements();
        const currentTagId = appState.uiState.currentTagId;
        const isDefaultTag = (currentTagId === DEFAULT_TAG_ID);
        
        if (!filteredStmts.length) {
            if (currentSearchKeyword && allStmts.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>🔍 没有找到包含 “${escapeHtml(currentSearchKeyword)}” 的语句</p></div>`;
            } else if (!allStmts.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-comment-dots"></i><p>✨ 暂无语句，添加一条吧～</p></div>`;
            } else {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>🔍 输入关键词搜索语句</p></div>`;
            }
            updateStats();
            restoreScrollPositions();
            return;
        }
        
        let html = '';
        filteredStmts.forEach((stmt, idx) => {
            const displayText = currentSearchKeyword ? highlightText(stmt.text, currentSearchKeyword) : escapeHtml(stmt.text);
            html += `
                <div class="statement-card" data-id="${stmt.id}">
                    <div class="card-index">#${idx+1}</div>
                    <div class="card-content">${displayText}</div>
                    <div class="card-actions">
                        <button class="icon-btn copy-to-tag-btn" data-action="copyToTag" data-id="${stmt.id}" title="复制到其他标签"><i class="fas fa-share-square"></i></button>
                        ${!isDefaultTag ? `<button class="icon-btn copy-to-default-btn" data-action="copyToDefault" data-id="${stmt.id}" title="添加到默认语库"><i class="fas fa-star"></i></button>` : ''}
                        <button class="icon-btn delete-btn" data-action="delete" data-id="${stmt.id}" title="删除"><i class="fas fa-trash-alt"></i></button>
                        <button class="icon-btn edit-btn" data-action="edit" data-id="${stmt.id}" title="编辑"><i class="fas fa-edit"></i></button>
                        <button class="icon-btn copy-btn" data-action="copy" data-id="${stmt.id}" title="复制文本"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        attachCardEvents();
        updateStats();
        restoreScrollPositions();
    }

    function attachCardEvents() {
        const container = document.getElementById('statementsList');
        if (!container) return;
        container.removeEventListener('click', handleCardClick);
        container.addEventListener('click', handleCardClick);
    }
    async function handleCardClick(e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        const statements = currentStatements(); // 使用原始数据，因为id存在于原始中
        const stmt = statements.find(s => s.id === id);
        if (!stmt) return;
        if (action === 'edit') openEditModal(id);
        else if (action === 'delete') deleteStatementById(id);
        else if (action === 'copy') copyStatementText(stmt.text);
        else if (action === 'copyToTag') showCopyToTagModal(stmt.text);
        else if (action === 'copyToDefault') copyToDefaultLibrary(stmt.text);
    }
    async function copyStatementText(text) {
        try { await navigator.clipboard.writeText(text); showMessage("✅ 已复制到剪贴板"); } 
        catch(err) { showMessage("复制失败", true); }
    }
    function openEditModal(id) {
        const stmt = currentStatements().find(s => s.id === id);
        if (!stmt) return;
        currentEditId = id;
        document.getElementById('editTextarea').value = stmt.text;
        document.getElementById('editModal').style.display = 'flex';
    }
    function saveEdit() {
        const newText = document.getElementById('editTextarea').value.trim();
        if (!newText) { showMessage("内容不能为空", true); return; }
        let statements = currentStatements();
        const idx = statements.findIndex(s => s.id === currentEditId);
        if (idx !== -1) {
            const oldText = statements[idx].text;
            if (oldText.trim() !== newText && isDuplicateInTag(appState.uiState.currentTagId, newText, currentEditId)) {
                showMessage("❌ 修改后的语句与当前标签下已有语句重复", true);
                return;
            }
            statements[idx].text = newText;
            setCurrentStatements(statements);
            showMessage("已更新");
        }
        closeEditModal();
    }
    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; currentEditId = null; }
    function deleteStatementById(id) {
        if (!confirm("删除此语句？")) return;
        let stmts = currentStatements().filter(s => s.id !== id);
        setCurrentStatements(stmts);
        showMessage("已删除");
    }
    function addNewStatement() {
        const input = document.getElementById('newStatementInput');
        const text = input.value.trim();
        if (!text) { showMessage("请输入内容", true); return; }
        const currentTag = appState.uiState.currentTagId;
        if (isDuplicateInTag(currentTag, text)) {
            showMessage("❌ 当前标签下已存在相同语句，请勿重复添加", true);
            return;
        }
        const newStmt = { id: generateId(), text };
        setCurrentStatements([...currentStatements(), newStmt]);
        input.value = "";
        showMessage("添加成功");
        setTimeout(() => { 
            const mainList = document.getElementById('mainListContainer');
            if (mainList) mainList.scrollTop = mainList.scrollHeight;
            saveScrollPositions();
        }, 50);
    }
    function initDragAndDrop() {
        const container = document.getElementById('statementsList');
        if (!container || !container.children.length) return;
        if (sortableInstance) sortableInstance.destroy();
        // 注意：拖拽操作是基于原始顺序，搜索时不应破坏数据的原始顺序
        // 但拖拽只应在显示全部时启用，搜索时禁用拖拽更合理。
        if (currentSearchKeyword) {
            // 搜索时禁用拖拽，因为显示的是过滤后的列表，拖拽会混乱
            return;
        }
        sortableInstance = new Sortable(container, {
            animation: 200, handle: '.statement-card', ghostClass: 'sortable-drag', touchStartThreshold: 2,
            onEnd: function(evt) {
                if (evt.oldIndex === undefined || evt.newIndex === undefined || evt.oldIndex === evt.newIndex) return;
                let stmts = currentStatements();
                const moved = stmts.splice(evt.oldIndex, 1)[0];
                stmts.splice(evt.newIndex, 0, moved);
                setCurrentStatements(stmts);
                showMessage("顺序已更新");
            }
        });
    }

    async function exportFullState() {
        const exportData = { tags: appState.tags, statementsMap: appState.statementsMap, uiState: appState.uiState, version: "4.3.0", exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `deepseek_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(blob);
        showMessage("已导出完整工作区");
    }
    async function importSmart(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                if (Array.isArray(parsed)) {
                    if (confirm("检测到旧格式语句列表。是否导入到【当前标签】？(重复语句将被跳过)")) {
                        let added = 0;
                        let duplicate = 0;
                        const currentTag = appState.uiState.currentTagId;
                        const newList = [...currentStatements()];
                        for (let item of parsed) {
                            const txt = (item.text || "").trim();
                            if (txt && !isDuplicateInTag(currentTag, txt)) {
                                newList.push({ id: generateId(), text: txt });
                                added++;
                            } else if (txt) duplicate++;
                        }
                        if (added) setCurrentStatements(newList);
                        showMessage(`导入完成: 新增 ${added} 条，跳过重复 ${duplicate} 条`);
                        if (duplicate > 0 && added === 0) showMessage("所有语句均为重复内容，未添加", true);
                    }
                    return;
                }
                else if (parsed.tags && parsed.statementsMap) {
                    if (confirm("导入完整备份将覆盖当前所有数据，确定吗？")) {
                        appState.tags = parsed.tags;
                        appState.statementsMap = parsed.statementsMap;
                        appState.uiState = parsed.uiState || { currentTagId: null, sidebarExpanded: false, mainListScrollTop: 0, sidebarScrollTop: 0, searchKeyword: "" };
                        ensureDefaultTagExists();
                        const defaultStmts = appState.statementsMap[DEFAULT_TAG_ID] || [];
                        const unique = [];
                        const seen = new Set();
                        for (let s of defaultStmts) {
                            const key = s.text.trim();
                            if (!seen.has(key)) { seen.add(key); unique.push(s); }
                        }
                        appState.statementsMap[DEFAULT_TAG_ID] = unique;
                        if (!appState.uiState.currentTagId || !appState.tags.some(t => t.id === appState.uiState.currentTagId)) appState.uiState.currentTagId = DEFAULT_TAG_ID;
                        currentSearchKeyword = appState.uiState.searchKeyword || "";
                        await persistState();
                        renderSidebar(); renderStatements(); updateStats(); initDragAndDrop(); restoreScrollPositions();
                        showMessage(`导入成功，共 ${appState.tags.length} 个标签`);
                    }
                } else throw new Error("格式不支持");
            } catch(err) { showMessage("导入失败: " + err.message, true); }
        };
        reader.readAsText(file);
    }
    async function resetToGlobalDefault() {
        if (!confirm("重置全局会丢失所有自定义数据，恢复为纯净预设（仅默认语库+7条语句）。确定吗？")) return;
        appState.tags = [{ id: DEFAULT_TAG_ID, name: "默认语库" }];
        appState.statementsMap = { [DEFAULT_TAG_ID]: getPresetStatements() };
        appState.uiState.currentTagId = DEFAULT_TAG_ID;
        appState.uiState.sidebarExpanded = false;
        appState.uiState.mainListScrollTop = 0;
        appState.uiState.sidebarScrollTop = 0;
        appState.uiState.searchKeyword = "";
        currentSearchKeyword = "";
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = "";
        document.getElementById('clearSearchBtn').style.display = "none";
        await persistState();
        renderSidebar(); renderStatements(); updateStats(); initDragAndDrop(); restoreScrollPositions();
        showMessage("已恢复纯净预设 (默认语库+7条经典语句)");
    }
    function updateStats() { 
        const filtered = getFilteredStatements();
        document.querySelector("#statCounter span").innerText = filtered.length;
    }
    function showMessage(msg, isErr = false) {
        let toast = document.getElementById('dynamicToast');
        if (!toast) { toast = document.createElement('div'); toast.id = 'dynamicToast'; toast.className = 'toast-msg'; document.body.appendChild(toast); }
        toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        toast.style.background = isErr ? '#c62828e6' : '#1e4a6be6';
        toast.style.opacity = '1';
        if (window.toastTimer) clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toast.style.opacity = '0', 2000);
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function initSidebarBehavior() {
        const sidebar = document.getElementById('sidebar');
        if (isTouchDevice) {
            sidebar.classList.add('touch-mode');
            if (appState.uiState.sidebarExpanded) sidebar.classList.add('expanded');
            else sidebar.classList.remove('expanded');
            sidebar.addEventListener('click', (e) => {
                if (e.target.closest('.delete-tag-icon') || e.target.closest('.add-tag-btn') || e.target.closest('.tag-item')) return;
                sidebar.classList.toggle('expanded');
                appState.uiState.sidebarExpanded = sidebar.classList.contains('expanded');
                persistState();
            });
        } else {
            if (appState.uiState.sidebarExpanded) sidebar.classList.add('expanded');
            else sidebar.classList.remove('expanded');
        }
    }
    function openTagModal(editTagId = null, existingName = '') {
        const modal = document.getElementById('tagModal');
        const title = document.getElementById('tagModalTitle');
        const input = document.getElementById('tagNameInput');
        if (editTagId) { title.innerHTML = '<i class="fas fa-edit"></i> 重命名标签'; input.value = existingName; modal._editId = editTagId; }
        else { title.innerHTML = '<i class="fas fa-plus"></i> 新建标签'; input.value = ''; delete modal._editId; }
        modal.style.display = 'flex';
        const confirm = () => {
            const newName = input.value.trim();
            if (!newName) { showMessage("标签名不能为空", true); return; }
            if (modal._editId) {
                const tag = appState.tags.find(t => t.id === modal._editId);
                if (tag && tag.id !== DEFAULT_TAG_ID) tag.name = newName;
                else if(tag && tag.id === DEFAULT_TAG_ID) { showMessage("默认语库名称不可修改", true); closeTagModal(); return; }
                persistState().then(() => { renderSidebar(); showMessage("已重命名"); });
            } else {
                const newId = generateId();
                appState.tags.push({ id: newId, name: newName });
                appState.statementsMap[newId] = [];
                persistState().then(() => { renderSidebar(); if (!appState.uiState.currentTagId) switchToTag(newId); });
                showMessage("新标签已创建");
            }
            closeTagModal();
        };
        document.getElementById('confirmTagBtn').onclick = confirm;
        document.getElementById('cancelTagBtn').onclick = closeTagModal;
        modal.onclick = (e) => { if (e.target === modal) closeTagModal(); };
    }
    function closeTagModal() { document.getElementById('tagModal').style.display = 'none'; }

    (async function() {
        await loadInitialState();
        // 恢复搜索关键词
        currentSearchKeyword = appState.uiState.searchKeyword || "";
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = currentSearchKeyword;
        document.getElementById('clearSearchBtn').style.display = currentSearchKeyword ? "flex" : "none";
        renderSidebar();
        renderStatements();
        updateStats();
        initDragAndDrop();
        initSidebarBehavior();
        bindScrollMemory();
        restoreScrollPositions();
        
        // 搜索事件绑定
        const searchInputElem = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        if (searchInputElem) {
            searchInputElem.addEventListener('input', (e) => {
                performSearch(e.target.value);
                initDragAndDrop(); // 搜索时拖拽状态更新
            });
        }
        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                clearSearch();
                initDragAndDrop();
            });
        }
        
        document.getElementById('addStatementBtn').addEventListener('click', addNewStatement);
        document.getElementById('newStatementInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewStatement(); });
        document.getElementById('exportBtn').addEventListener('click', exportFullState);
        document.getElementById('importFileInput').addEventListener('change', (e) => { if(e.target.files[0]) importSmart(e.target.files[0]); e.target.value=''; });
        document.getElementById('resetDefaultBtn').addEventListener('click', resetToGlobalDefault);
        document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
        document.getElementById('editModal').addEventListener('click', (e) => { if(e.target === document.getElementById('editModal')) closeEditModal(); });
        document.getElementById('sidebarAddTagBtn').addEventListener('click', () => openTagModal());
        document.getElementById('cancelSelectTagBtn').addEventListener('click', closeSelectTagModal);
        document.getElementById('selectTagModal').addEventListener('click', (e) => { if(e.target === document.getElementById('selectTagModal')) closeSelectTagModal(); });
    })();
</script>
